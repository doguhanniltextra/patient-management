name: CI - Auth Service

on:
  push:
    branches: [ "master" ]
    paths:
      - 'auth-service/**'
      - '.github/workflows/auth-service.yml'
      - 'patient-management-bom/**'
  workflow_dispatch:

jobs:
  build:
    uses: ./.github/workflows/_docker-build.yml
    with:
      service-name: auth-service
      context: ./auth-service
      dockerfile: ./auth-service/Dockerfile