server.port=8084

spring.datasource.url=jdbc:postgresql://postgres-db-appointment:5432/appointment_database
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.initialization-fail-timeout=0

spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.ByteArrayDeserializer
metrics.recording.level=OFF

# =============================================================================
# Resilience4j — Circuit Breaker
# =============================================================================
# patient-service circuit breaker
resilience4j.circuitbreaker.instances.patientService.sliding-window-size=10
resilience4j.circuitbreaker.instances.patientService.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.patientService.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.patientService.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.patientService.minimum-number-of-calls=5

# doctor-service circuit breaker
resilience4j.circuitbreaker.instances.doctorService.sliding-window-size=10
resilience4j.circuitbreaker.instances.doctorService.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.doctorService.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.doctorService.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.doctorService.minimum-number-of-calls=5

# =============================================================================
# Resilience4j — Retry
# =============================================================================
resilience4j.retry.instances.patientService.max-attempts=3
resilience4j.retry.instances.patientService.wait-duration=500ms

resilience4j.retry.instances.doctorService.max-attempts=3
resilience4j.retry.instances.doctorService.wait-duration=500ms

# Actuator / Prometheus
management.endpoints.web.exposure.include=health,info,prometheus,metrics
management.endpoint.health.show-details=always
management.metrics.tags.application=appointment-service
