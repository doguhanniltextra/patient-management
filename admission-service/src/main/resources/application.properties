spring.application.name=admission-service
server.port=8086

# Database configuration (Shared PostgreSQL)
spring.datasource.url=jdbc:postgresql://postgresql:5432/patient_db
spring.datasource.username=postgres
spring.datasource.password=postgres123
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Kafka configuration
spring.kafka.bootstrap-servers=kafka:9092
spring.kafka.consumer.group-id=admission-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer

# Service Security
# (In production, these would be in environment variables)
app.secret=mySecretKeyForJwtTokenWhichMustBeAtLeast256BitsLong
internal.service.token=pm-internal-token

# API documentation
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# Actuator
management.endpoints.web.exposure.include=health,info,prometheus,metrics
management.endpoint.health.show-details=always
management.metrics.export.prometheus.enabled=true

# Kafka Topics
kafka.topic.admission-bed-charge=admission-bed-charge.v1
kafka.topic.admission-discharged=admission-discharged.v1
