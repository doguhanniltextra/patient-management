# Database configuration (Isolated PostgreSQL Schema)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://postgresql:5432/patient_db?currentSchema=doctor_schema}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:doctor_user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:doctor_pass_123}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update

# Explicitly set the default schema for Hibernate to find tables in doctor_schema
spring.jpa.properties.hibernate.default_schema=doctor_schema
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

server.port=8083
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.initialization-fail-timeout=0

doctor.service.address=doctor-service
doctor.service.grpc.port=9005

# Kafka
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:kafka:9092}
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer

metrics.recording.level=OFF

# Actuator / Prometheus
management.endpoints.web.exposure.include=health,info,prometheus,metrics
management.endpoint.health.show-details=always
management.metrics.tags.application=doctor-service

internal.service.token=${INTERNAL_SERVICE_TOKEN:pm-internal-token}
kafka.topics.lab-order-placed=${KAFKA_TOPIC_LAB_ORDER_PLACED:lab-order-placed.v1}
kafka.topics.lab-result-completed=${KAFKA_TOPIC_LAB_RESULT_COMPLETED:lab-result-completed.v1}
kafka.groups.doctor-lab-result=${KAFKA_GROUP_DOCTOR_LAB_RESULT:doctor-lab-result-group}
