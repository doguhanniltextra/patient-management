# Resource limit defaults for Java microservices
x-java-service-resources: &java-resources
  deploy:
    resources:
      limits:
        cpus: "1.0"
        memory: 512M
      reservations:
        cpus: "0.25"
        memory: 256M

services:
  # ============================================================================
  # INFRASTRUCTURE SERVICES
  # ============================================================================

  # Kafka Message Broker
  kafka:
    image: apache/kafka:3.9.0
    container_name: kafka
    restart: unless-stopped
    ports:
      - "9092:9092"
    environment:
      KAFKA_KRAFT_CLUSTER_ID: "Z8yQy-uDSsucb45mrW0b4Q"
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: controller,broker
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_HEARTBEAT_INTERVAL_MS: 3000
      KAFKA_SESSION_TIMEOUT_MS: 30000
    deploy:
      resources:
        limits:
          cpus: "1.5"
          memory: 1G
        reservations:
          cpus: "0.5"
          memory: 512M
    volumes:
      - kafka-data:/var/lib/kafka/data
    networks:
      - patient-network
    healthcheck:
      test:
        [
          "CMD",
          "/opt/kafka/bin/kafka-broker-api-versions.sh",
          "--bootstrap-server",
          "localhost:9092",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  # PostgreSQL Database - Unified database for all relational data
  postgresql:
    image: postgres:15-alpine
    container_name: postgresql
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: patient_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
    deploy:
      resources:
        limits:
          cpus: "1.5"
          memory: 1G
        reservations:
          cpus: "0.5"
          memory: 512M
    volumes:
      - postgresql-data:/var/lib/postgresql/data
      - ./scripts/postgres:/docker-entrypoint-initdb.d
    networks:
      - patient-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5



  # ============================================================================
  # MICROSERVICES
  # ============================================================================

  # API Gateway - Entry point for all requests
  api-gateway:
    <<: *java-resources
    build:
      context: .
      dockerfile: api-gateway/Dockerfile
    container_name: api-gateway
    restart: unless-stopped
    ports:
      - "4004:4004"
    depends_on:
      kafka:
        condition: service_healthy
      postgresql:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SERVER_PORT: 4004
      APP_SECRET: A7f9K2mN8pQ3sT6vY1zB4cD7gH0jL3nP6qR9uW2xE5yI8oU1aS4dF7hK0mP3sV6z
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      PATIENT_SERVICE_URL: http://patient-management:8080
      AUTH_SERVICE_URL: http://auth-service:8089
      DOCTOR_SERVICE_URL: http://doctor-service:8083
      APPOINTMENT_SERVICE_URL: http://appointment-service:8084
      BILLING_SERVICE_URL: http://billing-service:8081
      LAB_SERVICE_URL: http://lab-service:8087
      INVENTORY_SERVICE_URL: http://inventory-service:8088

    volumes:
      - ./api-gateway/src:/app/src
    networks:
      - patient-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4004/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  # Patient Service - Manages patient records (PostgreSQL)
  patient-management:
    <<: *java-resources
    build:
      context: .
      dockerfile: patient-management/Dockerfile
    container_name: patient-management
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      postgresql:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SERVER_PORT: 8080
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgresql:5432/patient_db?currentSchema=patient_schema&reWriteBatchedInserts=true
      SPRING_DATASOURCE_USERNAME: patient_user
      SPRING_DATASOURCE_PASSWORD: patient_pass_123
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_TOPIC_LAB_RESULT_COMPLETED: lab-result-completed.v1
      KAFKA_GROUP_PATIENT_LAB_RESULT: patient-lab-result-group
      APP_SECRET: A7f9K2mN8pQ3sT6vY1zB4cD7gH0jL3nP6qR9uW2xE5yI8oU1aS4dF7hK0mP3sV6z
    volumes:
      - ./patient-management/src:/app/src
    networks:
      - patient-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  # Auth Service - Authentication & Authorization (PostgreSQL)
  auth-service:
    <<: *java-resources
    build:
      context: .
      dockerfile: auth-service/Dockerfile
    container_name: auth-service
    restart: unless-stopped
    ports:
      - "8089:8089"
    depends_on:
      postgresql:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SERVER_PORT: 8089
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgresql:5432/patient_db?currentSchema=auth_schema&reWriteBatchedInserts=true
      SPRING_DATASOURCE_USERNAME: auth_user
      SPRING_DATASOURCE_PASSWORD: auth_pass_123
      JWT_SECRET: your-secret-jwt-key-change-in-production
      APP_SECRET: A7f9K2mN8pQ3sT6vY1zB4cD7gH0jL3nP6qR9uW2xE5yI8oU1aS4dF7hK0mP3sV6z
      API_KEY: your-api-key-change-in-production
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    volumes:
      - ./auth-service/src:/app/src
    networks:
      - patient-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8089/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  # Doctor Service - Manages doctor profiles (PostgreSQL)
  doctor-service:
    <<: *java-resources
    build:
      context: .
      dockerfile: doctor-service/Dockerfile
    container_name: doctor-service
