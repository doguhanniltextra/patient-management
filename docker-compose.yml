    depends_on:
      postgresql:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SERVER_PORT: 8083
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgresql:5432/patient_db?currentSchema=doctor_schema&reWriteBatchedInserts=true
      SPRING_DATASOURCE_USERNAME: doctor_user
      SPRING_DATASOURCE_PASSWORD: doctor_pass_123
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_TOPIC_LAB_ORDER_PLACED: lab-order-placed.v1
      KAFKA_TOPIC_LAB_RESULT_COMPLETED: lab-result-completed.v1
      KAFKA_GROUP_DOCTOR_LAB_RESULT: doctor-lab-result-group
      APP_SECRET: A7f9K2mN8pQ3sT6vY1zB4cD7gH0jL3nP6qR9uW2xE5yI8oU1aS4dF7hK0mP3sV6z
    volumes:
      - ./doctor-service/src:/app/src
    networks:
      - patient-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8083/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  # Appointment Service - Manages appointments (PostgreSQL)
  appointment-service:
    <<: *java-resources
    build:
      context: .
      dockerfile: appointment-service/Dockerfile
    container_name: appointment-service
    restart: unless-stopped
    ports:
      - "8084:8084"
    depends_on:
      postgresql:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SERVER_PORT: 8084
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgresql:5432/patient_db?currentSchema=appointment_schema&reWriteBatchedInserts=true
      SPRING_DATASOURCE_USERNAME: appointment_user
      SPRING_DATASOURCE_PASSWORD: appointment_pass_123
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      APP_SECRET: A7f9K2mN8pQ3sT6vY1zB4cD7gH0jL3nP6qR9uW2xE5yI8oU1aS4dF7hK0mP3sV6z
    volumes:
      - ./appointment-service/src:/app/src
    networks:
      - patient-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8084/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  # Billing Service - Manages billing & payments (PostgreSQL)
  billing-service:
    <<: *java-resources
    build:
      context: .
      dockerfile: billing-service/Dockerfile
    container_name: billing-service
    restart: unless-stopped
    ports:
      - "8081:8081"
    depends_on:
      postgresql:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SERVER_PORT: 8081
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgresql:5432/patient_db?currentSchema=billing_schema&reWriteBatchedInserts=true
      SPRING_DATASOURCE_USERNAME: billing_user
      SPRING_DATASOURCE_PASSWORD: billing_pass_123
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_TOPIC_LAB_ORDER_PLACED: lab-order-placed.v1
      KAFKA_GROUP_BILLING_LAB_ORDER: billing-lab-order-group
      INVOICE_API_KEY: placeholder-api-key
      INVOICE_API_URL: https://invoice-generator.com/api/v1/invoices
    volumes:
      - ./billing-service/src:/app/src
    networks:
      - patient-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  # Lab Service - Manages lab workflows (PostgreSQL)
  lab-service:
    <<: *java-resources
    build:
      context: .
      dockerfile: lab-service/Dockerfile
    container_name: lab-service
    restart: unless-stopped
    ports:
      - "8087:8087"
    depends_on:
      postgresql:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SERVER_PORT: 8087
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgresql:5432/patient_db?currentSchema=lab_schema&reWriteBatchedInserts=true
      SPRING_DATASOURCE_USERNAME: lab_user
      SPRING_DATASOURCE_PASSWORD: lab_pass_123
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_TOPIC_LAB_ORDER_PLACED: lab-order-placed.v1
      KAFKA_TOPIC_LAB_RESULT_COMPLETED: lab-result-completed.v1
      KAFKA_GROUP_LAB_ORDER: lab-order-group
      APP_SECRET: A7f9K2mN8pQ3sT6vY1zB4cD7gH0jL3nP6qR9uW2xE5yI8oU1aS4dF7hK0mP3sV6z
    volumes:
      - ./lab-service/src:/app/src
    networks:
      - patient-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8087/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  inventory-service:
    <<: *java-resources
    build:
      context: .
      dockerfile: inventory-service/Dockerfile
    container_name: inventory-service
    restart: unless-stopped
    ports:
      - "8088:8088"
    depends_on:
      postgresql:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SERVER_PORT: 8088
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgresql:5432/patient_db?currentSchema=inventory_schema&reWriteBatchedInserts=true
      SPRING_DATASOURCE_USERNAME: inventory_user
      SPRING_DATASOURCE_PASSWORD: inventory_pass_123
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    volumes:
      - ./inventory-service/src:/app/src
    networks:
      - patient-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8088/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  admission-service:
    <<: *java-resources
    build:
      context: .
      dockerfile: admission-service/Dockerfile
    container_name: admission-service
    restart: unless-stopped
    ports:
      - "8086:8086"
    depends_on:
      postgresql:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SERVER_PORT: 8086
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgresql:5432/patient_db?currentSchema=admission_schema&reWriteBatchedInserts=true
      SPRING_DATASOURCE_USERNAME: admission_user
      SPRING_DATASOURCE_PASSWORD: admission_pass_123
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    volumes:
      - ./admission-service/src:/app/src
    networks:
      - patient-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8086/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  notification-service:
    <<: *java-resources
    build:
      context: .
      dockerfile: notification-service/Dockerfile
    container_name: notification-service
    restart: unless-stopped
    ports:
      - "8090:8090"
    depends_on:
      postgresql:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SERVER_PORT: 8090
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgresql:5432/patient_db?currentSchema=notification_schema&reWriteBatchedInserts=true
      SPRING_DATASOURCE_USERNAME: notification_user
      SPRING_DATASOURCE_PASSWORD: notification_pass_123
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      PATIENT_SERVICE_URL: http://patient-management:8080
    volumes:
      - ./notification-service/src:/app/src
    networks:
      - patient-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8090/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 5


  # ============================================================================
  # MONITORING
  # ============================================================================

  # Prometheus - Metrics collection
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=7d"
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 256M
    networks:
      - patient-network
    depends_on:
      - api-gateway
      - patient-management
      - auth-service
      - doctor-service
      - appointment-service
      - billing-service
      - lab-service
      - inventory-service
      - admission-service


  # Grafana - Metrics visualization
  grafana:
    image: grafana/grafana:10.4.0
    container_name: grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 256M
    networks:
      - patient-network
    depends_on:
      - prometheus

# Named volumes for persistent data
volumes:
  kafka-data:
    driver: local
  postgresql-data:
    driver: local
  prometheus-data:
    driver: local
  grafana-data:
    driver: local

# Network configuration
networks:
  patient-network:
    driver: bridge
  lab-network:
    driver: bridge
