server.port=8087
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://postgresql:5432/patient_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres123}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:kafka:9092}
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.consumer.auto-offset-reset=earliest
management.endpoints.web.exposure.include=health,info,prometheus,metrics
management.endpoint.health.show-details=always
management.metrics.tags.application=lab-service
app.secret=${APP_SECRET:mySecretKeyForJwtTokenWhichMustBeAtLeast256BitsLong}
internal.service.token=${INTERNAL_SERVICE_TOKEN:pm-internal-token}
kafka.topics.lab-order-placed=${KAFKA_TOPIC_LAB_ORDER_PLACED:lab-order-placed.v1}
kafka.topics.lab-result-completed=${KAFKA_TOPIC_LAB_RESULT_COMPLETED:lab-result-completed.v1}
kafka.groups.lab-order=${KAFKA_GROUP_LAB_ORDER:lab-order-group}
