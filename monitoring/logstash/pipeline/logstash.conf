input {
  kafka {
    bootstrap_servers => "kafka:9092"
    topics => ["his-audit-logs"]
    codec => json
    group_id => "logstash-audit-group"
  }
}

filter {
  # Standardize timestamp from microservice
  date {
    match => [ "@timestamp", "ISO8601" ]
    target => "@timestamp"
  }
}

output {
  # Direct bridge to MongoDB Audit Store
  # Note: Requires logstash-output-mongodb plugin
  mongodb {
    uri => "mongodb://audit-mongodb:27017/his_audit_db"
    database => "his_audit_db"
    collection => "audit_logs"
    # Optimized Bulk Insert Performance
    bulk => true
    bulk_interval => 3
  }
  
  # Fail-safe console output for debugging
  stdout { codec => rubydebug }
}
