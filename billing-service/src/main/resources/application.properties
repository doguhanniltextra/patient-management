server.port=8081

# Database configuration (Isolated PostgreSQL Schema)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://postgresql:5432/patient_db?currentSchema=billing_schema}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:billing_user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:billing_pass_123}
spring.jpa.hibernate.ddl-auto=update

# Explicitly set the default schema for Hibernate to find tables in billing_schema
spring.jpa.properties.hibernate.default_schema=billing_schema
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# gRPC
grpc.server.port=9001
logging.pattern.console=%-5level %logger{36} - %msg%n
spring.output.ansi.enabled=ALWAYS

# External APIs
invoice.api.key=${INVOICE_API_KEY}
invoice.api.url=${INVOICE_API_URL:https://invoice-generator.com}
claim.api.url=${CLAIM_API_URL:https://httpbin.org/status/200}
claims.retry.fixed-delay-ms=${CLAIMS_RETRY_FIXED_DELAY_MS:300000}

# Resilience4j - Claim Provider
resilience4j.circuitbreaker.instances.claimProvider.sliding-window-size=10
resilience4j.circuitbreaker.instances.claimProvider.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.claimProvider.wait-duration-in-open-state=30s
resilience4j.circuitbreaker.instances.claimProvider.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.claimProvider.minimum-number-of-calls=5

# Tracing & Observation
management.tracing.sampling.probability=1.0
spring.kafka.producer.observation-enabled=true
spring.kafka.listener.observation-enabled=true

# Actuator
management.endpoints.web.exposure.include=health,info,prometheus,metrics
management.endpoint.health.show-details=always
management.metrics.tags.application=billing-service

# Kafka
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:kafka:9092}
kafka.topics.lab-order-placed=${KAFKA_TOPIC_LAB_ORDER_PLACED:lab-order-placed.v1}
kafka.groups.billing-lab-order=${KAFKA_GROUP_BILLING_LAB_ORDER:billing-lab-order-group}
